# Agent 主动推荐机制配置

recommendation:
  # 是否启用主动推荐系统
  enabled: true
  
  # 事件触发器配置
  triggers:
    # 堆野提醒
    stack:
      enabled: true
      cooldown: 60  # 冷却时间（秒）
      threshold: null  # 阈值（无）
    
    # 符文刷新
    rune:
      enabled: true
      cooldown: 30
      threshold: null
    
    # 低血量预警
    low_health:
      enabled: true
      cooldown: 10
      threshold: 0.2  # 血量低于 20% 触发
    
    # 敌方消失
    enemy_missing:
      enabled: true
      cooldown: 120
      threshold: null
    
    # 物品购买
    item_purchase:
      enabled: true
      cooldown: 30
      threshold: null
    
    # 游戏开始
    game_start:
      enabled: true
      cooldown: 0
      threshold: null
    
    # 击杀/死亡
    kill_death:
      enabled: true
      cooldown: 60
      threshold: null
  
  # 决策引擎配置
  decision_engines:
    # 规则推理引擎
    rule:
      enabled: true
      weight: 0.3  # 权重
    
    # 数据驱动引擎
    data:
      enabled: true
      weight: 0.4
    
    # LLM 增强引擎
    llm:
      enabled: true
      weight: 0.3
  
  # 决策融合配置
  fusion:
    # 冲突解决策略: weighted_average | max_confidence
    conflict_resolution: "weighted_average"
    
    # 最低置信度阈值（低于此值不推荐）
    min_confidence: 0.5
    
    # 是否启用冲突检测
    enable_conflict_detection: true
  
  # 推送配置
  push:
    # SSE 推送端点
    sse_endpoint: "/api/gsi/recommendations"
    
    # 推送超时时间（秒）
    push_timeout: 5
    
    # 最大推送队列长度
    max_queue_size: 100
