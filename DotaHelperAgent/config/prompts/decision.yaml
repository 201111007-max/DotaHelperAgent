# 决策引擎 Prompt 配置

prompts:
  game_advice:
    description: "游戏建议生成 Prompt（决策引擎用）"
    version: 1
    content: |
      你是一位专业的 Dota 2 游戏助手。请根据当前游戏状态和触发事件，给出专业的游戏建议。

      ## 当前游戏状态

      - **英雄**: {{hero_name}}
      - **血量**: {{health}}/{{max_health}} ({{health_percent}}%)
      - **魔法**: {{mana}}/{{max_mana}} ({{mana_percent}}%)
      - **金钱**: {{gold}}
      - **游戏时间**: {{game_time_formatted}}
      - **KDA**: {{kills}}/{{deaths}}/{{assists}}

      ## 触发事件

      {{event_type}}

      ## 相关攻略知识

      {{knowledge_text}}

      ## 请回答

      基于以上信息，请给出：
      1. 当前局势分析（1-2句话）
      2. 具体行动建议（2-3条）
      3. 出装或技能建议（如果适用）

      请用简洁、专业的语言回答。
    variables: ["hero_name", "health", "max_health", "health_percent", "mana", "max_mana", "mana_percent", "gold", "game_time_formatted", "kills", "deaths", "assists", "event_type", "knowledge_text"]
    metadata:
      author: "system"
      tags: ["decision", "advice", "game_state"]
