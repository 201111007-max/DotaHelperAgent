# DotaHelperAgent 知识管理系统配置文件
# 配置向量数据库、知识融合和知识查询参数

# 向量数据库配置
vector_store:
  # 持久化目录
  persist_directory: "./data/chroma_db"
  
  # 集合名称
  collection_name: "dota_guides"
  
  # Embedding 模型配置
  embedding:
    # OpenAI Embedding 模型
    # 选项: text-embedding-3-small, text-embedding-3-large, text-embedding-ada-002
    model: "text-embedding-3-small"
    
    # 向量维度
    dimension: 1536
    
    # 是否使用本地模型作为后备
    use_local_fallback: true
    
    # 本地模型名称
    local_model: "all-MiniLM-L6-v2"
  
  # 是否使用内存模式（测试时使用）
  in_memory: false
  
  # 检索配置
  search:
    # 默认返回结果数量
    default_n_results: 5
    
    # 最大返回结果数量
    max_n_results: 20

# 知识融合配置
fusion:
  # 实体对齐配置
  entity_alignment:
    # 是否启用实体对齐
    enabled: true
    
    # 英雄名称映射文件
    hero_mapping_file: "./data/mappings/heroes.json"
    
    # 物品名称映射文件
    item_mapping_file: "./data/mappings/items.json"
  
  # 冲突检测配置
  conflict_detection:
    # 是否启用冲突检测
    enabled: true
    
    # 冲突阈值
    threshold: 0.5
  
  # 置信度评估配置
  confidence:
    # 数据源可信度
    sources:
      opendota: 0.9
      dotabuff: 0.85
      wiki: 0.7
      guide: 0.6
      user: 0.5
      unknown: 0.3
    
    # 胜率权重
    win_rate_weight: 0.3
    
    # 选取率权重
    pick_rate_weight: 0.2
    
    # 时效性权重
    recency_weight: 0.1

# 知识查询配置
query:
  # 默认知识类型
  # 选项: unstructured, structured, fused
  default_type: "fused"
  
  # 查询超时时间（秒）
  timeout: 30
  
  # 是否缓存查询结果
  cache_enabled: true
  
  # 缓存过期时间（秒）
  cache_ttl: 3600

# 数据导入配置
import:
  # 批量导入大小
  batch_size: 100
  
  # 是否覆盖已存在的文档
  overwrite: false
  
  # 支持的文件格式
  supported_formats:
    - "json"
    - "md"
    - "txt"

# 日志配置
logging:
  # 日志级别
  level: "INFO"
  
  # 是否记录详细日志
  verbose: false
  
  # 日志文件路径
  file: "./logs/knowledge.log"
